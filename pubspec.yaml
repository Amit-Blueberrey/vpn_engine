name: vpn_engine
description: Production-grade WireGuard VPN Engine for Flutter (all platforms)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management ────────────────────────────────────────────────────────
  # NOTE: Riverpod 3.x moved ChangeNotifierProvider to legacy.dart
  provider: ^6.1.5+1
  flutter_riverpod: ^3.1.0
  riverpod: ^3.1.0

  # ── Networking ──────────────────────────────────────────────────────────────
  dio: ^5.8.0+1
  http: ^1.3.0

  # ── Secure storage (for WireGuard private keys & JWT tokens) ────────────────
  # v10 requires Flutter >=3.22 and Dart >=3.3. Dropped legacy EncryptedSharedPrefs
  # on Android – now uses custom Tink-based AES-GCM cipher.
  flutter_secure_storage: ^9.2.4

  # ── Crypto / WireGuard key generation ───────────────────────────────────────
  cryptography: ^2.7.0
  pointycastle: ^3.9.1

  # ── Native platform channel bridge ──────────────────────────────────────────
  plugin_platform_interface: ^2.1.8

  # ── JSON serialization ───────────────────────────────────────────────────────
  json_annotation: ^4.9.0

  # ── Device & package info ────────────────────────────────────────────────────
  device_info_plus: ^11.2.0
  package_info_plus: ^8.3.0

  # ── UUID generation ──────────────────────────────────────────────────────────
  uuid: ^4.5.1

  # ── Network connectivity ─────────────────────────────────────────────────────
  connectivity_plus: ^6.1.4

  # ── Logging ──────────────────────────────────────────────────────────────────
  logger: ^2.5.0
  talker_flutter: ^4.9.0

  # ── UI ───────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  # material_design_icons_flutter: ^7.0.7496
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  lottie: ^3.3.1
  gap: ^3.0.1

  # ── Shared preferences ───────────────────────────────────────────────────────
  shared_preferences: ^2.5.3

  # ── Intl/formatting ──────────────────────────────────────────────────────────
  intl: ^0.20.2
  wireguard_flutter: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/
